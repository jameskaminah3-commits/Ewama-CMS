kind = "web"
previewPath = "/"
title = "EWAMA Properties Ltd"
version = "1.0.0"
id = "artifacts/ewama-website"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22943

[services.development]
run = "pnpm --filter @workspace/ewama-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ewama-website", "run", "build" ]
serve = "static"
publicDir = "artifacts/ewama-website/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22943"
BASE_PATH = "/"
